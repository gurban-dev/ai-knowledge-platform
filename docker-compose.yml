name: ai-knowledge-platform

services:
  postgres:
    # pgvector image ships Postgres 16 with the vector extension preinstalled
    image: pgvector/pgvector:pg16
    container_name: akp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: akp
      POSTGRES_PASSWORD: akp_dev_password
      POSTGRES_DB: akp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akp -d akp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: akp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
