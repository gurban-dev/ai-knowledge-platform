apiVersion: apps/v1
kind: Deployment
metadata:
  name: akp-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: akp-api
  template:
    metadata:
      labels:
        app: akp-api
    spec:
      containers:
        - name: api
          image: akp-api:latest
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4000
            periodSeconds: 20
          envFrom:
            - secretRef:
                name: akp-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: akp-api
spec:
  selector:
    app: akp-api
  ports:
    - port: 80
      targetPort: 4000
